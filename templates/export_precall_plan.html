<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pre-call Plan Report</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            background-color: #f5f7fa;
            color: #333;
        }

        h1 {
            font-size: 2.5rem;
            color: #1c1c1c;
            margin-bottom: 30px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .section {
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease-in-out, box-shadow 0.3s;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        h4 {
            color: #4A4AFA;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Pre-call Plan Report</h1>
    <div class="container">
        {% for section in sections %}
        <div class="section">
            <h4>{{ section.title }}</h4>
            <p>{{ section.content }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
